services:
  chat-app-backend:
    build:
      dockerfile: ./dockerfile/main.dockerfile
    container_name: chat-app-backend
    restart: unless-stopped
  emqx:
    image: emqx:latest
    container_name: emqx
    ports:
      - "18083:18083"
      - "1883:1883"
      - "5369:5369"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
    restart: unless-stopped
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - traefik/traefik.yml:/etc/traefik/traefik.yml
      - /var/run/docker.sock:/var/run/docker.sock
 